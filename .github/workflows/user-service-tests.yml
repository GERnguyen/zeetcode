name: UserService CI - tests

on:
  push:
    branches: ["dev", "main"]
    paths:
      - "be/UserService/**"
  pull_request:
    branches: ["dev", "main"]
    paths:
      - "be/UserService/**"

jobs:
  test:
    name: Run UserService tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./be/UserService
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: "npm"
          cache-dependency-path: ./be/UserService/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          NODE_ENV: test
        run: npm test --if-present
